<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>SEAPEDIA - Marketplace</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">SEAPEDIA</div>
    <div class="navbar-links" id="navLinks">
      <a href="products.html">Katalog</a>
      <a href="login.html" id="loginLink">Login</a>
      <a href="register.html" id="registerLink">Daftar</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Selamat Datang di SEAPEDIA</h1>
    <p>Marketplace tempat Buyer, Seller, dan Driver bertemu dalam satu platform.</p>
    <a href="products.html" class="btn-primary">Mulai Belanja</a>
  </section>

  <section class="featured-products">
    <h2>Produk Unggulan</h2>
    <div class="product-grid" id="productGrid"></div>
  </section>

  <section class="reviews-section">
    <h2>Apa Kata Pengguna Kami</h2>

    <form id="reviewForm" class="review-form">
      <div class="form-group">
        <label>Nama</label>
        <input type="text" id="reviewName" required>
      </div>
      <div class="form-group">
        <label>Rating</label>
        <select id="reviewRating" required>
          <option value="">-- Pilih rating --</option>
          <option value="5">⭐⭐⭐⭐⭐ (5)</option>
          <option value="4">⭐⭐⭐⭐ (4)</option>
          <option value="3">⭐⭐⭐ (3)</option>
          <option value="2">⭐⭐ (2)</option>
          <option value="1">⭐ (1)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Komentar</label>
        <textarea id="reviewComment" rows="3" required></textarea>
      </div>
      <button type="submit">Kirim Review</button>
      <p id="reviewErrorMsg" class="error-message"></p>
    </form>

    <div id="reviewList" class="review-list">
      <p>Memuat review...</p>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 SEAPEDIA - SEA COMPFEST 18 Project</p>
  </footer>

  <script src="js/dummy-products.js"></script>
  <script src="js/main.js"></script>
  <script src="js/reviews.js"></script>
</body>
</html>
