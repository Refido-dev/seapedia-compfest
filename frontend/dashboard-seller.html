<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Seller - SEAPEDIA</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">SEAPEDIA</div>
    <div class="navbar-links">
      <span id="userInfo" style="margin-right: 1rem;"></span>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <section class="dashboard-shell">
    <h1>Dashboard Seller</h1>
    <p>Selamat datang! Ini halaman dashboard untuk role Seller.</p>

    <div class="dashboard-cards">
  <div class="dashboard-card">
    <h3>🏪 Toko Saya</h3>
    <p>Belum ada toko <span style="font-size: 0.8rem; color: #888;">(fitur toko di level selanjutnya)</span></p>
  </div>
  <div class="dashboard-card">
    <h3>📋 Produk</h3>
    <p>0 produk <span style="font-size: 0.8rem; color: #888;">(fitur kelola produk di level selanjutnya)</span></p>
  </div>
  <div class="dashboard-card">
    <h3>📦 Pesanan Masuk</h3>
    <p>Belum ada pesanan <span style="font-size: 0.8rem; color: #888;">(fitur order di level selanjutnya)</span></p>
  </div>
</div>
  </section>

  <script src="js/dashboard.js"></script>
</body>
</html>
