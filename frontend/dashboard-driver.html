<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Driver - SEAPEDIA</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">SEAPEDIA</div>
    <div class="navbar-links">
      <span id="userInfo" style="margin-right: 1rem;"></span>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <section class="dashboard-shell">
    <h1>Dashboard Driver</h1>
    <p>Selamat datang! Ini halaman dashboard untuk role Driver.</p>

    <div class="dashboard-cards">
    <div class="dashboard-card">
       <h3>🚗 Job Aktif</h3>
    <p>Belum ada job <span style="font-size: 0.8rem; color: #888;">(fitur job di level selanjutnya)</span></p>
     </div>
    <div class="dashboard-card">
    <h3>📜 Riwayat Job</h3>
    <p>Belum ada riwayat <span style="font-size: 0.8rem; color: #888;">(fitur riwayat di level selanjutnya)</span></p>
    </div>
   <div class="dashboard-card">
    <h3>💵 Pendapatan</h3>
    <p>Rp 0 <span style="font-size: 0.8rem; color: #888;">(fitur pendapatan di level selanjutnya)</span></p>
     </div>
</div>
  </section>

  <script src="js/dashboard.js"></script>
</body>
</html>
