<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin - SEAPEDIA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">SEAPEDIA</div>
    <div class="navbar-links">
      <span id="userInfo" style="margin-right: 1rem;"></span>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <section class="dashboard-shell">
    <h1>Dashboard Admin</h1>
    <p>Selamat datang! Ini halaman dashboard untuk role Admin.</p>

   <div class="dashboard-cards">
  <div class="dashboard-card">
    <h3>👥 Kelola User</h3>
    <p>0 user <span style="font-size: 0.8rem; color: #888;">(fitur kelola user di level selanjutnya)</span></p>
  </div>
  <div class="dashboard-card">
    <h3>🏪 Kelola Toko</h3>
    <p>0 toko <span style="font-size: 0.8rem; color: #888;">(fitur kelola toko di level selanjutnya)</span></p>
  </div>
  <div class="dashboard-card">
    <h3>📊 Monitoring</h3>
    <p>Belum ada data <span style="font-size: 0.8rem; color: #888;">(fitur monitoring di level selanjutnya)</span></p>
  </div>
</div>
  </section>

  <script src="js/dashboard.js"></script>
</body>
</html>
